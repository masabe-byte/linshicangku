name: Pronunciation Hugging Face Import

on:
  workflow_dispatch:
    inputs:
      start_offset:
        description: "Start scanning offset in the pronunciation JSON"
        required: true
        default: "0"
      batch_size:
        description: "How many missing words to upload per batch"
        required: true
        default: "500"
      max_batches:
        description: "How many batches to run in this workflow"
        required: true
        default: "40"
      import_mode:
        description: "missing skips existing Hugging Face files; range processes raw offsets"
        required: true
        default: "missing"
      source_json:
        description: "Pronunciation JSON URL or repo path"
        required: false
        default: "https://raw.githubusercontent.com/thousandlemons/English-words-pronunciation-mp3-audio-download/master/ultimate.json"
      dry_run:
        description: "Set to 1 to test without uploading"
        required: false
        default: "0"
      upload_delay_ms:
        description: "Delay between Hugging Face commit uploads"
        required: true
        default: "3000"
      upload_retries:
        description: "Retries for Hugging Face 429/504 commit errors"
        required: true
        default: "4"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install --upgrade huggingface_hub[cli]

      - name: Import pronunciation audio to Hugging Face Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: masabe/english-pronunciation-audio
          IMPORT_MODE: ${{ inputs.import_mode }}
          IMPORT_OFFSET: ${{ inputs.start_offset }}
          IMPORT_BATCH_SIZE: ${{ inputs.batch_size }}
          IMPORT_MAX_BATCHES: ${{ inputs.max_batches }}
          PRONUNCIATION_SOURCE_JSON: ${{ inputs.source_json }}
          HF_UPLOAD_DELAY_MS: ${{ inputs.upload_delay_ms }}
          HF_UPLOAD_RETRIES: ${{ inputs.upload_retries }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npm run pronunciation:hf:import
